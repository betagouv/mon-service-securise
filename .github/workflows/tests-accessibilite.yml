name: Tests d'accessibilité
permissions: {}

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * 1'

jobs:
  accessibilite:
    name: Tests d'accessibilité Playwright

    runs-on: ubuntu-latest

    steps:
      - name: Cloner le dépôt Git
        uses: actions/checkout@v6

      - name: Déterminer la version de Node.js à utiliser
        run: |
          echo "NODE_VERSION=$(./scripts/get-node-version.sh)" >> $GITHUB_ENV

      - name: Utiliser la version Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Installer les dépendances
        run: npm install -g "$(jq -r '.packageManager' package.json)" && pnpm install

      - name: Installer les navigateurs Playwright
        run: ./node_modules/.bin/playwright install chromium --with-deps

      - name: Exécuter les tests d'accessibilité
        env:
          OIDC_URL_BASE: ${{ secrets.ACCESSIBILITE_OIDC_URL_BASE }}
          OIDC_CLIENT_ID: ${{ secrets.ACCESSIBILITE_OIDC_CLIENT_ID }}
          OIDC_CLIENT_SECRET: ${{ secrets.ACCESSIBILITE_OIDC_CLIENT_SECRET }}
          METABASE_API_KEY: ${{ secrets.ACCESSIBILITE_METABASE_API_KEY }}
          STATISTIQUES_DOMAINE_METABASE_MSS: ${{ secrets.ACCESSIBILITE_STATISTIQUES_DOMAINE_METABASE_MSS }}
          CRISP_ID_SITE: ${{ secrets.ACCESSIBILITE_CRISP_ID_SITE }}
          CRISP_CLE_API: ${{ secrets.ACCESSIBILITE_CRISP_CLE_API }}
        run: pnpm test:a11y

      - name: Publier le rapport d'accessibilité dans le summary Github
        if: ${{ !cancelled() }}
        run: cat test_accessibilite/rapport/rapport-accessibilite.md >> $GITHUB_STEP_SUMMARY

      - name: Publier le rapport d'accessibilité sur Mattermost
        if: ${{ !cancelled() }}
        env:
          MATTERMOST_WEBHOOK_URL: ${{ secrets.ACCESSIBILITE_MATTERMOST_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          RESUME=$(awk '/^## Résumé/{found=1} found && /^## Violations/{exit} found{print}' test_accessibilite/rapport/rapport-accessibilite.md)
          MESSAGE="$(printf '%s\n\n[Voir le rapport complet sur Github](%s)' "$RESUME" "$RUN_URL")"
          curl -X POST "$MATTERMOST_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg text "$MESSAGE" '{"text": $text}')"

      - name: Publier les screenshots d'exécution en artefact
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: screenshots
          path: test_accessibilite/screenshots/
